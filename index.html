<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Letter</title>
<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#ffd6e7;
    overflow:hidden;
}

.envelope{
    position:relative;
    width:300px;
    height:200px;
}

.body{
    position:absolute;
    width:100%;
    height:100%;
    background:white;
    border:2px solid #ccc;
    z-index:2;
}

.flap{
    position:absolute;
    width:0;
    height:0;
    border-left:150px solid transparent;
    border-right:150px solid transparent;
    border-top:100px solid #f5f5f5;
    transform-origin:top;
    z-index:3;
    animation:openFlap 2s forwards;
}

.letter{
    position:absolute;
    width:260px;
    height:180px;
    background:#fffaf0;
    left:20px;
    top:40px;
    z-index:1;
    text-align:center;
    padding-top:40px;
    box-sizing:border-box;
    animation:pullOut 3s forwards 1.5s;
}

@keyframes openFlap{
    to{
        transform:rotateX(180deg);
    }
}

@keyframes pullOut{
    to{
        transform:translateY(-180px);
    }
}
</style>
</head>
<body>

<div class="envelope">
    <div class="letter">
        <h3>💌</h3>
        <p>তুমি আমার হৃদয়ের সবচেয়ে সুন্দর গল্প।</p>
    </div>
    <div class="body"></div>
    <div class="flap"></div>
</div>

</body>
</html>
